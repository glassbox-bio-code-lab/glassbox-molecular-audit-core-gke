x-google-marketplace:
  schemaVersion: v2
  applicationApiVersion: v1beta1

  # Not published directly; this schema is used only for Verification (/data-test overlay).
  publishedVersion: "1.0.0"

  images:
    "":
      properties:
        image.standard.repository:
          type: REPO_WITH_REGISTRY
        image.standard.tag:
          type: TAG
    deep-tools:
      properties:
        image.deep.repository:
          type: REPO_WITH_REGISTRY
        image.deep.tag:
          type: TAG
    ubbagent:
      properties:
        ubbagent.image.repository:
          type: REPO_WITH_REGISTRY
        ubbagent.image.tag:
          type: TAG
    tester:
      properties:
        apptest.image.repository:
          type: REPO_WITH_REGISTRY
        apptest.image.tag:
          type: TAG

properties:
  name:
    type: string
    x-google-marketplace:
      type: NAME
    default: glassbox-mol-audit-test

  namespace:
    type: string
    x-google-marketplace:
      type: NAMESPACE
    default: glassbox-mol-audit-test

  # Satisfies required REPORTING_SECRET wiring in the base schema.
  marketplace.reportingSecret:
    type: string
    default: gs://cloud-marketplace-tools/reporting_secrets/fake_reporting_secret.yaml
    x-google-marketplace:
      type: REPORTING_SECRET

  config.projectId:
    type: string
    default: verification_project

  config.runMode:
    type: string
    default: standard

  config.categoryId:
    type: string
    default: SMALL_MOLECULE__STRUCTURE_PRESENT__NO_MD_TRAJ

  config.failClosed:
    type: boolean
    default: false

  config.standardModeQuiet:
    type: boolean
    default: true

  storage.type:
    type: string
    default: pvc

  storage.pvc.size:
    type: string
    default: 50Gi

  storage.pvc.storageClassName:
    type: string
    default: ""

required:
  - name
  - namespace
  - marketplace.reportingSecret
