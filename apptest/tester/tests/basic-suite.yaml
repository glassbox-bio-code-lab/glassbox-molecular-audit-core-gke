actions:
- name: Core resources are installed
  bashTest:
    script: |-
      set -euo pipefail
      kubectl -n "${NAMESPACE}" get configmap "${APP_CONFIGMAP}" >/dev/null
      kubectl -n "${NAMESPACE}" get pvc "${APP_PVC_NAME}" >/dev/null
      kubectl -n "${NAMESPACE}" get serviceaccount "${APP_SERVICE_ACCOUNT}" >/dev/null

- name: Stage verification input bundle into the shared PVC
  bashTest:
    script: |-
      set -euo pipefail
      helper="${APP_INSTANCE_NAME}-verification-io"
      helper_image="${APP_IO_IMAGE:-alpine:3.20}"
      kubectl -n "${NAMESPACE}" delete pod "${helper}" --ignore-not-found >/dev/null 2>&1 || true
      kubectl -n "${NAMESPACE}" wait --for=delete "pod/${helper}" --timeout=60s >/dev/null 2>&1 || true
      cat <<YAML | kubectl -n "${NAMESPACE}" apply -f -
      apiVersion: v1
      kind: Pod
      metadata:
        name: ${helper}
        labels:
          app.kubernetes.io/instance: ${APP_INSTANCE_NAME}
          app.kubernetes.io/name: glassbox-mol-audit
      spec:
        restartPolicy: Never
        serviceAccountName: ${APP_SERVICE_ACCOUNT}
        containers:
        - name: io
          image: ${helper_image}
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
          command: ["/bin/sh", "-c", "sleep 3600"]
          volumeMounts:
          - name: data
            mountPath: /data
        volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ${APP_PVC_NAME}
      YAML
      kubectl -n "${NAMESPACE}" wait --for=condition=Ready "pod/${helper}" --timeout=600s
      kubectl -n "${NAMESPACE}" exec "${helper}" -- sh -c "mkdir -p /data/input/${APP_PROJECT_ID}"
      kubectl -n "${NAMESPACE}" cp /fixtures/test/. "${helper}:/data/input/${APP_PROJECT_ID}"
      kubectl -n "${NAMESPACE}" exec "${helper}" -- sh -c "find /data/input/${APP_PROJECT_ID} -maxdepth 2 -type f | sort | head -20"
      kubectl -n "${NAMESPACE}" delete pod "${helper}" --ignore-not-found >/dev/null 2>&1 || true
      kubectl -n "${NAMESPACE}" wait --for=delete "pod/${helper}" --timeout=180s >/dev/null 2>&1 || true

- name: Run a standard verification job
  bashTest:
    script: |-
      set -euo pipefail
      run_id="verification-${APP_INSTANCE_NAME}"
      job_name="${APP_INSTANCE_NAME}-verification-run"
      helper_image="${APP_IO_IMAGE:-alpine:3.20}"
      dump_namespace_events() {
        echo "=== recent namespace events (${NAMESPACE}) ==="
        kubectl -n "${NAMESPACE}" get events --sort-by=.lastTimestamp || true
      }
      dump_job_debug() {
        echo "=== job summary (${job_name}) ==="
        kubectl -n "${NAMESPACE}" get job "${job_name}" -o wide || true
        echo "=== job yaml (${job_name}) ==="
        kubectl -n "${NAMESPACE}" get job "${job_name}" -o yaml || true
        echo "=== configmap yaml (${APP_CONFIGMAP}) ==="
        kubectl -n "${NAMESPACE}" get configmap "${APP_CONFIGMAP}" -o yaml || true
        echo "=== pods for job (${job_name}) ==="
        kubectl -n "${NAMESPACE}" get pods -l job-name="${job_name}" -o wide || true
        pods="$(kubectl -n "${NAMESPACE}" get pods -l job-name="${job_name}" -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' 2>/dev/null || true)"
        if [ -z "${pods}" ]; then
          echo "No pods found for ${job_name}"
        fi
        for pod in ${pods}; do
          echo "=== describe pod/${pod} ==="
          kubectl -n "${NAMESPACE}" describe pod "${pod}" || true
          echo "=== pod json summary ${pod} ==="
          kubectl -n "${NAMESPACE}" get pod "${pod}" -o jsonpath='pod={.metadata.name}{"\nphase="}{.status.phase}{"\nreason="}{.status.reason}{"\nmessage="}{.status.message}{"\nstartTime="}{.status.startTime}{"\ncontainerStates="}{range .status.initContainerStatuses[*]}{.name}{":"}{if .state.waiting}{.state.waiting.reason}{":"}{.state.waiting.message}{end}{if .state.terminated}{.state.terminated.reason}{":"}{.state.terminated.message}{" exit="}{.state.terminated.exitCode}{end}{"\n"}{end}{range .status.containerStatuses[*]}{.name}{":"}{if .state.waiting}{.state.waiting.reason}{":"}{.state.waiting.message}{end}{if .state.terminated}{.state.terminated.reason}{":"}{.state.terminated.message}{" exit="}{.state.terminated.exitCode}{end}{if .lastState.terminated}{" last="}{.lastState.terminated.reason}{":"}{.lastState.terminated.message}{" exit="}{.lastState.terminated.exitCode}{end}{"\n"}{end}' || true
          containers="$(kubectl -n "${NAMESPACE}" get pod "${pod}" -o jsonpath='{range .spec.initContainers[*]}{.name}{"\n"}{end}{range .spec.containers[*]}{.name}{"\n"}{end}' 2>/dev/null || true)"
          for container in ${containers}; do
            echo "=== logs pod/${pod} container/${container} current ==="
            kubectl -n "${NAMESPACE}" logs "${pod}" -c "${container}" --timestamps --tail=500 || true
            echo "=== logs pod/${pod} container/${container} previous ==="
            kubectl -n "${NAMESPACE}" logs "${pod}" -c "${container}" --previous --timestamps --tail=500 || true
          done
        done
        dump_namespace_events
      }
      wait_for_job_terminal_state() {
        timeout_seconds="${1:-3600}"
        poll_seconds=10
        elapsed=0
        while [ "${elapsed}" -lt "${timeout_seconds}" ]; do
          complete="$(kubectl -n "${NAMESPACE}" get job "${job_name}" -o jsonpath='{.status.conditions[?(@.type=="Complete")].status}' 2>/dev/null || true)"
          failed="$(kubectl -n "${NAMESPACE}" get job "${job_name}" -o jsonpath='{.status.conditions[?(@.type=="Failed")].status}' 2>/dev/null || true)"
          if [ "${complete}" = "True" ]; then
            echo "Verification job completed successfully"
            return 0
          fi
          if [ "${failed}" = "True" ]; then
            echo "Verification job entered Failed state before timeout"
            dump_job_debug
            return 1
          fi
          sleep "${poll_seconds}"
          elapsed=$((elapsed + poll_seconds))
        done

        echo "Verification job timed out waiting for completion"
        dump_job_debug
        return 1
      }
      kubectl -n "${NAMESPACE}" delete job "${job_name}" --ignore-not-found >/dev/null 2>&1 || true
      cat <<YAML | kubectl -n "${NAMESPACE}" apply -f -
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: ${job_name}
        labels:
          app.kubernetes.io/instance: ${APP_INSTANCE_NAME}
          app.kubernetes.io/name: glassbox-mol-audit
      spec:
        backoffLimit: 0
        ttlSecondsAfterFinished: 600
        template:
          metadata:
            labels:
              app.kubernetes.io/instance: ${APP_INSTANCE_NAME}
              app.kubernetes.io/name: glassbox-mol-audit
          spec:
            restartPolicy: Never
            serviceAccountName: ${APP_SERVICE_ACCOUNT}
            initContainers:
            - name: init-volume-perms
              image: ${helper_image}
              imagePullPolicy: IfNotPresent
              securityContext:
                runAsUser: 0
              command: ["/bin/sh", "-c"]
              args:
              - |
                set -eu
                mkdir -p /data/input /data/output
                chmod -R a+rwX /data/input /data/output || true
              volumeMounts:
              - name: data
                mountPath: /data
            containers:
            - name: glassbox-mol-audit
              image: ${APP_RUNTIME_IMAGE}
              envFrom:
              - configMapRef:
                  name: ${APP_CONFIGMAP}
              env:
              - name: GBX_RUN_ID
                value: ${run_id}
              command: ["/bin/sh", "-c"]
              args:
              - |
                set -eu
                exec python3 -m app.gbx_core_runner_v3 \
                  --project-id "\${PROJECT_ID}" \
                  --input-root "\${INPUT_PATH}" \
                  --output-dir "\${OUTPUT_PATH}" 2>&1
              volumeMounts:
              - name: data
                mountPath: /data
            volumes:
            - name: data
              persistentVolumeClaim:
                claimName: ${APP_PVC_NAME}
      YAML
      if ! wait_for_job_terminal_state 3600; then
        exit 1
      fi

- name: Verify output artifacts exist
  bashTest:
    script: |-
      set -euo pipefail
      helper="${APP_INSTANCE_NAME}-verification-io"
      run_id="verification-${APP_INSTANCE_NAME}"
      helper_image="${APP_IO_IMAGE:-alpine:3.20}"
      dump_helper_debug() {
        echo "=== helper pod summary (${helper}) ==="
        kubectl -n "${NAMESPACE}" get pod "${helper}" -o wide || true
        echo "=== describe pod/${helper} ==="
        kubectl -n "${NAMESPACE}" describe pod "${helper}" || true
        echo "=== helper logs (${helper}) ==="
        kubectl -n "${NAMESPACE}" logs "${helper}" --timestamps --tail=200 || true
        echo "=== output tree for ${run_id} ==="
        kubectl -n "${NAMESPACE}" exec "${helper}" -- sh -c "find /data/output/${run_id} -maxdepth 3 -type f | sort" || true
        echo "=== results directory listing for ${run_id} ==="
        kubectl -n "${NAMESPACE}" exec "${helper}" -- sh -c "ls -lah /data/output/${run_id}/results" || true
        echo "=== summary.json (${run_id}) ==="
        kubectl -n "${NAMESPACE}" exec "${helper}" -- sh -c "test -f /data/output/${run_id}/results/summary.json && sed -n '1,220p' /data/output/${run_id}/results/summary.json" || true
        echo "=== recent namespace events (${NAMESPACE}) ==="
        kubectl -n "${NAMESPACE}" get events --sort-by=.lastTimestamp || true
      }
      kubectl -n "${NAMESPACE}" delete pod "${helper}" --ignore-not-found >/dev/null 2>&1 || true
      kubectl -n "${NAMESPACE}" wait --for=delete "pod/${helper}" --timeout=60s >/dev/null 2>&1 || true
      cat <<YAML | kubectl -n "${NAMESPACE}" apply -f -
      apiVersion: v1
      kind: Pod
      metadata:
        name: ${helper}
        labels:
          app.kubernetes.io/instance: ${APP_INSTANCE_NAME}
          app.kubernetes.io/name: glassbox-mol-audit
      spec:
        restartPolicy: Never
        serviceAccountName: ${APP_SERVICE_ACCOUNT}
        containers:
        - name: io
          image: ${helper_image}
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
          command: ["/bin/sh", "-c", "sleep 3600"]
          volumeMounts:
          - name: data
            mountPath: /data
        volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ${APP_PVC_NAME}
      YAML
      if ! kubectl -n "${NAMESPACE}" wait --for=condition=Ready "pod/${helper}" --timeout=600s; then
        echo "Helper pod did not become Ready"
        dump_helper_debug
        exit 1
      fi
      if ! kubectl -n "${NAMESPACE}" exec "${helper}" -- sh -c "test -f /data/output/${run_id}/results/summary.json"; then
        echo "Missing summary.json for ${run_id}"
        dump_helper_debug
        exit 1
      fi
      if ! kubectl -n "${NAMESPACE}" exec "${helper}" -- sh -c "test -f /data/output/${run_id}/run_manifest.json"; then
        echo "Missing run_manifest.json for ${run_id}"
        dump_helper_debug
        exit 1
      fi
      if ! kubectl -n "${NAMESPACE}" exec "${helper}" -- sh -c "jq -e '.status == \"SUCCESS\" or .status == \"success\" or .execution' /data/output/${run_id}/results/summary.json >/dev/null"; then
        echo "summary.json did not contain a success/execution marker for ${run_id}"
        dump_helper_debug
        exit 1
      fi
      kubectl -n "${NAMESPACE}" delete job "${APP_INSTANCE_NAME}-verification-run" --ignore-not-found >/dev/null 2>&1 || true
      kubectl -n "${NAMESPACE}" delete pod "${helper}" --ignore-not-found >/dev/null 2>&1 || true
