x-google-marketplace:
  schemaVersion: v2
  applicationApiVersion: v1beta1

  # Not published directly; this schema is used only for Verification (/data-test overlay).
  publishedVersion: "1.0"

  deployment:
    chart:
      name: glassbox-mol-audit

  images:
    standard:
      properties:
        standardImageRepo:
          type: REPO_WITH_REGISTRY
        standardImageTag:
          type: TAG
    deep:
      properties:
        deepImageRepo:
          type: REPO_WITH_REGISTRY
        deepImageTag:
          type: TAG
    ubbagent:
      properties:
        ubbagentImageRepo:
          type: REPO_WITH_REGISTRY
        ubbagentImageTag:
          type: TAG
    tester:
      properties:
        testerImageRepo:
          type: REPO_WITH_REGISTRY
        testerImageTag:
          type: TAG

  configurableResources:
    - name: glassbox-mol-audit
      values:
        # NAME/NAMESPACE fields control the Helm release name and namespace.
        job.enabled: false

        # Verification should not perform metering.
        ubbagent.enabled: false
        marketplace.reportingSecret: $reportingSecret

        image.standard.repository: $standardImageRepo
        image.standard.tag: $standardImageTag
        image.deep.repository: $deepImageRepo
        image.deep.tag: $deepImageTag
        image.repository: $standardImageRepo
        image.tag: $standardImageTag

        apptest.enabled: true
        apptest.image.repository: $testerImageRepo
        apptest.image.tag: $testerImageTag

        config.projectId: $projectId
        config.runMode: standard
        config.categoryId: SMALL_MOLECULE__STRUCTURE_PRESENT__NO_MD_TRAJ
        config.failClosed: false
        config.entitlementUrl: http://127.0.0.1:9
        config.entitlementAuthMode: google
        config.entitlementAudience: http://127.0.0.1:9
        config.standardModeQuiet: true

properties:
  name:
    type: string
    x-google-marketplace:
      type: NAME
    default: glassbox-mol-audit-test

  namespace:
    type: string
    x-google-marketplace:
      type: NAMESPACE
    default: glassbox-mol-audit-test

  # Satisfies required REPORTING_SECRET wiring in the base schema.
  reportingSecret:
    type: string
    default: gs://cloud-marketplace-tools/reporting_secrets/fake_reporting_secret.yaml
    x-google-marketplace:
      type: REPORTING_SECRET

  # Defaults below make `mpdev verify` usable without passing parameters.
  standardImageRepo:
    type: string
    default: us-docker.pkg.dev/glassbox-bio-public/glassbox-bio-molecular-audit/glassbox-mol-audit
  standardImageTag:
    type: string
    default: 1.0.1

  deepImageRepo:
    type: string
    default: us-docker.pkg.dev/glassbox-bio-public/glassbox-bio-molecular-audit/glassbox-mol-audit-deep-tools
  deepImageTag:
    type: string
    default: 1.0.1

  ubbagentImageRepo:
    type: string
    default: us-docker.pkg.dev/glassbox-bio-public/glassbox-bio-molecular-audit/glassbox-mol-audit/ubbagent
  ubbagentImageTag:
    type: string
    default: 1.0.1

  testerImageRepo:
    type: string
    default: us-docker.pkg.dev/glassbox-bio-public/glassbox-bio-molecular-audit/glassbox-mol-audit/tester
  testerImageTag:
    type: string
    default: 1.0.1

  projectId:
    type: string
    default: verification_project

required:
  - name
  - namespace
  - reportingSecret
