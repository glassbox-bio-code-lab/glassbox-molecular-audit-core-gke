x-google-marketplace:
  schemaVersion: v2
  applicationApiVersion: v1beta1

  publishedVersion: "1.0.1"
  publishedVersionMetadata:
    releaseNote: >-
      Bugfix release for sealed report embedding and report wording alignment.
    releaseTypes:
      - BugFix
    recommended: true

  clusterConstraints:
    k8sVersion: ">=1.27.0"
    assistedClusterCreation:
      type: DISABLED
      creationGuidance: >-
        Create or select a GKE cluster before deployment. Standard mode runs on
        x86 Kubernetes nodes. Deep mode requires a compatible NVIDIA GPU node
        pool and is zone-capacity dependent; the current chart default targets
        cloud.google.com/gke-accelerator=nvidia-l4.

  images:
    "":
      properties:
        image.standard.repository:
          type: REPO_WITH_REGISTRY
        image.standard.tag:
          type: TAG
    deep-tools:
      properties:
        image.deep.repository:
          type: REPO_WITH_REGISTRY
        image.deep.tag:
          type: TAG
    ubbagent:
      properties:
        ubbagent.image.repository:
          type: REPO_WITH_REGISTRY
        ubbagent.image.tag:
          type: TAG

properties:
  name:
    type: string
    title: Application name
    x-google-marketplace:
      type: NAME

  namespace:
    type: string
    title: Kubernetes namespace
    x-google-marketplace:
      type: NAMESPACE

  marketplace.reportingSecret:
    type: string
    title: Marketplace reporting secret
    description: Kubernetes Secret name injected by Marketplace for usage reporting.
    x-google-marketplace:
      type: REPORTING_SECRET

  config.projectId:
    type: string
    title: Project ID
    default: mol_audit_demo

  config.runMode:
    type: string
    title: Run mode
    enum:
      - standard
      - deep
    default: standard

  config.categoryId:
    type: string
    title: Category ID
    description: Required when enabling the runtime Job. Must match the project input evidence class.
    default: ""

  config.gcpRegion:
    type: string
    title: GCP region
    description: Primary deployment region for locality-aware installs.
    default: ""

  config.gcpLocation:
    type: string
    title: GCP location
    description: Explicit location override when region and location differ.
    default: ""

  config.dataResidency:
    type: string
    title: Data residency
    enum:
      - strict
      - project_local
      - permissive
    default: strict

  config.egressMode:
    type: string
    title: Egress mode
    enum:
      - STRICT_LOCAL
      - ALLOW_GCP_ONLY
      - ALLOW_EXTERNAL
    default: STRICT_LOCAL

  config.optionalAnalytics:
    type: boolean
    title: Optional analytics
    default: false

  config.allowedEgressDomains:
    type: string
    title: Allowed egress domains
    default: ""

  config.regionTraceability:
    type: boolean
    title: Region traceability
    default: true

  config.timezone:
    type: string
    title: Timezone
    default: UTC

  config.failClosed:
    type: boolean
    title: Fail closed on inadmissible inputs
    default: true

  config.reproPackEnabled:
    type: boolean
    title: Include Repro Pack outputs
    default: true

  config.standardModeQuiet:
    type: boolean
    title: Suppress standard-mode skip warnings
    default: false

  config.entitlementUrl:
    type: string
    title: Entitlement URL
    description: Base URL for entitlement verification and usage events.
    default: ""

  config.entitlementAuthMode:
    type: string
    title: Entitlement auth mode
    enum:
      - ""
      - auto
      - google
      - gcp
      - idtoken
      - principal
      - none
      - off
      - disabled
    default: google

  config.entitlementAudience:
    type: string
    title: Entitlement audience
    default: ""

  config.entitlementTimeoutSec:
    type: string
    title: Entitlement timeout in seconds
    default: "20"

  storage.type:
    type: string
    title: Storage type
    enum:
      - pvc
      - gcs
    default: pvc

  storage.pvc.size:
    type: string
    title: PVC size
    default: 50Gi

  storage.pvc.storageClassName:
    type: string
    title: PVC StorageClass
    default: standard

  storage.gcs.bucket:
    type: string
    title: GCS bucket (for gcs storage)
    default: ""

  workloadIdentity.enabled:
    type: boolean
    title: Enable Workload Identity
    description: Required for identity-only entitlement flow and recommended for GCS mode.
    default: false

  workloadIdentity.gcpServiceAccount:
    type: string
    title: GCP Service Account for Workload Identity
    default: ""

  image.standard.digest:
    type: string
    title: Standard runner image digest (optional)
    description: Optional immutable standard runner image digest, format sha256:<64 hex chars>.
    default: ""

  image.deep.digest:
    type: string
    title: Deep runner image digest (optional)
    description: Optional immutable deep runner image digest, format sha256:<64 hex chars>.
    default: ""

  ubbagent.image.digest:
    type: string
    title: UBB agent image digest (optional)
    description: Optional immutable UBB agent image digest, format sha256:<64 hex chars>.
    default: ""

required:
  - name
  - namespace
  - marketplace.reportingSecret
