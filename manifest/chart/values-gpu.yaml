# Deep/GPU overlay selects the deep runtime by default and applies the required
# GPU resources/scheduling. Tags and digests should still be overridden at
# deploy time so releases remain explicit and immutable.

image:
  repository: us-docker.pkg.dev/glassbox-bio-public/glassbox-bio-molecular-audit/glassbox-mol-audit-deep-tools
  deep:
    repository: us-docker.pkg.dev/glassbox-bio-public/glassbox-bio-molecular-audit/glassbox-mol-audit-deep-tools

config:
  runMode: deep

resources:
  requests:
    cpu: "4"
    memory: 32Gi
    nvidia.com/gpu: "1"
  limits:
    cpu: "8"
    memory: 64Gi
    nvidia.com/gpu: "1"

nodeSelector:
  cloud.google.com/gke-accelerator: nvidia-l4

tolerations:
  - key: "nvidia.com/gpu"
    operator: "Exists"
    effect: "NoSchedule"

storage:
  type: pvc
  pvc:
    storageClassName: premium-rwo
    size: 200Gi

job:
  activeDeadlineSeconds: 28800
