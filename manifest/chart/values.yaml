  pvc:
    storageClassName: standard
    size: 50Gi
  gcs:
    bucket: ""
    mountPath: /data
    sidecarImage: gcr.io/google.com/cloudsdktool/cloud-sdk:slim

serviceAccount:
  create: true
  name: ""
  annotations: {}

workloadIdentity:
  enabled: false
  gcpServiceAccount: ""

