  tag: "1.0.1"
  pullPolicy: IfNotPresent
  digest: ""
  standard:
    repository: us-docker.pkg.dev/glassbox-bio-public/glassbox-bio-molecular-audit/glassbox-mol-audit
    tag: "1.0.1"
