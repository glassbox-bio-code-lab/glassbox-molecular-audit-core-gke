config:
  projectId: mol_audit_demo
  runMode: standard
  # Required when job.enabled=true. Must match the input evidence class.
  categoryId: ""
  inputPath: /data/input
  outputPath: /data/output
  runId: ""
  failClosed: true
  reproPackEnabled: true
  entitlementUrl: https://glassbox-seal-662656813262.us-central1.run.app
  # Optional: set to "auto"|"google"|"gcp"|"idtoken" to attach Authorization bearer token.
  entitlementAuthMode: "google"
  # Optional: explicit audience to mint the identity token for. Defaults to entitlementUrl.
  entitlementAudience: "https://glassbox-seal-662656813262.us-central1.run.app"
  # Entitlement HTTP timeout in seconds. Verification can override this to fail fast.
  entitlementTimeoutSec: "20"
  TN_DISABLE_EXTERNAL_DATA: "0"
  TN_ENABLE_UQ: "1"
  TN_ENABLE_OT_FEATURES: "1"
  standardModeQuiet: false

marketplace:
  reportingSecret: ""
  partnerSolutionLabel: "isol_plb32_001kf00001e8runiab_pwayyor5jqd3hikviwgqy5hwrx2hnpn5"

ubbagent:
  enabled: false
  image:
    repository: us-docker.pkg.dev/glassbox-bio-public/glassbox-bio-molecular-audit/glassbox-mol-audit/ubbagent
    tag: "1.0.1"
    pullPolicy: IfNotPresent
    digest: ""
  localPort: "4567"
  # Legacy single-metric override. Leave empty for mode-aware metric selection.
  metricName: ""
  metricNameStandard: standard_audit_run
  metricNameDeep: deep_audit_run
  serviceName: molecular-audit-core.endpoints.glassbox-bio-public.cloud.goog

resources:
  requests:
    cpu: "2"
    memory: 8Gi
  limits:
