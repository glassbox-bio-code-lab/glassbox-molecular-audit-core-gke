{{- if .Values.apptest.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "glassbox-mol-audit.fullname" . }}-apptest
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "glassbox-mol-audit.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "configmaps", "persistentvolumeclaims", "serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "glassbox-mol-audit.fullname" . }}-apptest
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "glassbox-mol-audit.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "glassbox-mol-audit.serviceAccountName" . | quote }}
    namespace: {{ .Release.Namespace | quote }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "glassbox-mol-audit.fullname" . }}-apptest
{{- end }}
