{{- /* yamllint disable rule:comments-indentation */ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "glassbox-mol-audit.fullname" . }}-config
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "glassbox-mol-audit.labels" . | nindent 4 }}
data:
  PROJECT_ID: {{ .Values.config.projectId | quote }}
  GBX_RUN_MODE: {{ .Values.config.runMode | quote }}
  GOOGLE_CLOUD_REGION: {{ .Values.config.gcpRegion | quote }}
  GOOGLE_CLOUD_LOCATION: {{ default .Values.config.gcpRegion .Values.config.gcpLocation | quote }}
  GBX_DEPLOY_REGION: {{ .Values.config.gcpRegion | quote }}
  GBX_DEPLOY_LOCATION: {{ default .Values.config.gcpRegion .Values.config.gcpLocation | quote }}
  GBX_DATA_RESIDENCY: {{ .Values.config.dataResidency | quote }}
  GBX_EGRESS_MODE: {{ .Values.config.egressMode | quote }}
  GBX_OPTIONAL_ANALYTICS_ENABLED: {{ ternary "1" "0" .Values.config.optionalAnalytics | quote }}
  GBX_ALLOWED_EGRESS_DOMAINS: {{ .Values.config.allowedEgressDomains | quote }}
  GBX_REGION_TRACEABILITY: {{ .Values.config.regionTraceability | quote }}
  TZ: {{ .Values.config.timezone | quote }}
  GBX_CATEGORY_ID: {{ .Values.config.categoryId | quote }}
  INPUT_PATH: {{ .Values.config.inputPath | quote }}
  OUTPUT_PATH: {{ .Values.config.outputPath | quote }}
  GBX_STORAGE_TYPE: {{ .Values.storage.type | quote }}
  GBX_GCS_BUCKET: {{ .Values.storage.gcs.bucket | quote }}
  {{- if .Values.config.runId }}
  # Optional deterministic run_id. The runner writes outputs under OUTPUT_PATH/<run_id>.
  GBX_RUN_ID: {{ .Values.config.runId | quote }}
  {{- end }}
  FAIL_CLOSED: {{ .Values.config.failClosed | quote }}
  REPRO_PACK_ENABLED: {{ .Values.config.reproPackEnabled | quote }}
  GBX_ENTITLEMENT_URL: {{ .Values.config.entitlementUrl | quote }}
  GBX_ENTITLEMENT_AUTH_MODE: {{ .Values.config.entitlementAuthMode | quote }}
  GBX_ENTITLEMENT_AUDIENCE: {{ .Values.config.entitlementAudience | quote }}
  GBX_ENTITLEMENT_TIMEOUT_SEC: {{ .Values.config.entitlementTimeoutSec | quote }}
  TN_DISABLE_EXTERNAL_DATA: {{ .Values.config.TN_DISABLE_EXTERNAL_DATA | quote }}
  TN_ENABLE_UQ: {{ .Values.config.TN_ENABLE_UQ | quote }}
  TN_ENABLE_OT_FEATURES: {{ .Values.config.TN_ENABLE_OT_FEATURES | quote }}
  GBX_STANDARD_MODE_QUIET: {{ .Values.config.standardModeQuiet | quote }}
